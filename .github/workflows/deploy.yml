name: Blue-Green Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v3

      - name: Copiar archivos al servidor
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "scripts/deploy.sh,templates/nginx.conf.template"
          target: "/tmp/pipeline"

      - name: Ejecutar deploy en servidor
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo cp /tmp/pipeline/scripts/deploy.sh /usr/local/bin/deploy.sh
            sudo cp /tmp/pipeline/templates/nginx.conf.template /etc/nginx/templates/nginx.conf.template
            sudo chmod +x /usr/local/bin/deploy.sh
            sudo /usr/local/bin/deploy.sh
            curl -I http://localhost
